# =============================================================================
# Squid — default-deny egress allowlist for the assistant stack
# TEE-SAFE: filters HTTPS by the CONNECT target host. NO SSL-bump / NO decryption,
# so PrivateMode's end-to-end encryption + attestation are preserved.
# =============================================================================

http_port 3128

# ----- allowlist (edit squid/allowlist.txt, not this file) -------------------
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

acl CONNECT method CONNECT
acl SSL_ports  port 443
acl Safe_ports port 80
acl Safe_ports port 443

# Only allow CONNECT to 443 (no plaintext tunnels to odd ports)
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

# ----- DEFAULT-DENY: nothing leaves unless its host is on the allowlist ------
http_access deny !allowed_domains
http_access allow allowed_domains
http_access deny all

# ----- logging to stdout/stderr so `docker logs squid` shows allow/deny ------
logfile_rotate 0
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
cache deny all

# No caching of content (we're a policy proxy, not a cache)
maximum_object_size 0 KB

# -----------------------------------------------------------------------------
# NOTE / hardening option:
# dstdomain on a CONNECT trusts the client-supplied host. A malicious client
# could send "CONNECT api.privatemode.ai" but a different SNI. For a single-user
# homelab agent using normal HTTP libraries this is the pragmatic default and it
# keeps the TEE path intact (no bump). If you later want Squid to verify the real
# SNI, switch to peek-and-splice:
#     acl step1 at_step SslBump1
#     ssl_bump peek step1
#     acl allowed_ssl ssl::server_name "/etc/squid/allowlist.txt"
#     ssl_bump splice allowed_ssl
#     ssl_bump terminate all
# That still does NOT decrypt (splice = passthrough), so attestation survives,
# but it requires a Squid build with OpenSSL and a signing cert on http_port.
# =============================================================================
