# =============================================================================
# LiteLLM — local model gateway in front of the PrivateMode TEE proxy.
# Privacy-first: prompt logging OFF, no external callbacks.
# The agent talks to LiteLLM with a *virtual key*; LiteLLM talks to PrivateMode.
# =============================================================================

model_list:
  - model_name: assistant-model            # <- the name the agent requests
    litellm_params:
      # >>> PLACEHOLDER <<< replace with your exact PrivateMode model id
      # (find it in your PrivateMode dashboard / model overview, e.g.
      #  "ibnzterrell/Meta-Llama-3.3-70B-Instruct-AWQ-INT4" or similar)
      model: openai/PLACEHOLDER_PRIVATEMODE_MODEL
      api_base: http://privatemode-proxy:8080/v1
      # The PrivateMode API key lives on the privatemode-proxy container, NOT here.
      # The local proxy endpoint is on the internal net; a dummy key is fine:
      api_key: "sk-noop-local-privatemode"

litellm_settings:
  turn_off_message_logging: true           # do not log prompts/responses
  success_callback: []                     # no external telemetry
  failure_callback: []
  drop_params: true                        # tolerate provider param differences

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Create a scoped virtual key (with a monthly budget + RPM cap) after first boot:
  #   curl -X POST http://localhost:4000/key/generate \
  #     -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
  #     -H "Content-Type: application/json" \
  #     -d '{"models":["assistant-model"],"max_budget":20,"budget_duration":"30d","rpm_limit":60}'
  # Put the returned sk-... into the agent as ANTHROPIC_AUTH_TOKEN.

# -----------------------------------------------------------------------------
